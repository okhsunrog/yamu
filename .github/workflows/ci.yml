name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      - name: Install FFmpeg development libraries
        run: >-
          sudo apt-get update && sudo apt-get install -y
          ffmpeg libavcodec-dev libavfilter-dev libavformat-dev
          libavutil-dev libswresample-dev
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-targets --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo package -p yamu --locked

  windows-media:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
      - name: Test Windows media file handling
        run: cargo test -p yamu --lib --features media-ffmpeg-cli --locked
